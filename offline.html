<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ECEDEA">
    <title>Travel Guide — 離線中</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100dvh;
            background: #ECEDEA;
            color: #2E2E2E;
            font-family: 'Avenir Next', -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: #F4F5F2;
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px -12px rgba(47,47,45,0.08);
            border: 1px solid rgba(200,204,199,0.3);
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 1.25rem;
            opacity: 0.5;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.6rem;
            color: #2E2E2E;
        }
        p {
            font-size: 0.9rem;
            color: #757573;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }
        a {
            display: inline-block;
            background: #2E2E2E;
            color: #fff;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 0.75rem 1.75rem;
            border-radius: 9999px;
            transition: opacity 0.18s;
        }
        a:hover { opacity: 0.85; }
        .kicker {
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            color: #B6B8B3;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✈️</div>
        <div class="kicker">Travel Guide</div>
        <h1>目前沒有網路連線</h1>
        <p>請確認你的網路狀態後再試一次。行程資料已儲存在裝置上，重新連線後即可繼續使用。</p>
        <a href="./">重新載入</a>
    </div>
</body>
</html>
